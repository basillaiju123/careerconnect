<html>
<head>
    <title>Job Details</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            margin:0;
            padding:0;
        }

        .container{
            width:70%;
            margin:60px auto;
        }

        .job-card{
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        h1{
            color:#1e3a8a;
        }

        p{
            font-size:20px;
            margin:15px 0;
        }

        .apply-btn{
            display:inline-block;
            background:#2563eb;
            color:white;
            text-decoration:none;
            padding:14px 30px;
            border-radius:10px;
            margin-top:20px;
            font-size:18px;
        }

        .apply-btn:hover{
            background:#1d4ed8;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="job-card">

        <h1>{{ job.title }}</h1>

        <p><strong>Company:</strong> {{ job.company }}</p>

        <p><strong>Location:</strong> {{ job.location }}</p>

        <p><strong>Description:</strong> {{ job.description }}</p>

        <a href="/apply/{{ job.id }}/" class="apply-btn">
            Apply Now
        </a>

    </div>

</div>

</body>
</html>
