<!DOCTYPE html>
<html>
<head>
    <title>Apply Job</title>

    <style>

        body{
            font-family:Arial, sans-serif;
            background:#f4f6f9;
        }

        .container{
            width:40%;
            background:white;
            margin:80px auto;
            padding:40px;
            border-radius:15px;
            box-shadow:0px 2px 12px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            color:#1e3a8a;
        }

        input{
            width:100%;
            padding:15px;
            margin-top:15px;
            border-radius:8px;
            border:1px solid #ccc;
        }

        button{
            width:100%;
            margin-top:20px;
            padding:15px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Apply for Job</h1>
    {% if success %}

    <p style="
    color:green;
    text-align:center;
    font-size:18px;
    margin-bottom:20px;
    ">
    
    ✅ Application Submitted Successfully
    
    </p>
    
    {% endif %}
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
    
        <input type="text" name="name" placeholder="Enter your name" required>
    
        <input type="email" name="email" placeholder="Enter your email" required>
    
        <input type="file" name="resume" required>
    
        <button type="submit">
            Submit Application
        </button>
    
    </form>

   


</div>

</body>
</html>
