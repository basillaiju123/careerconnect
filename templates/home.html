<!DOCTYPE html>
<html>
<head>
    <title>CareerConnect</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
        }

        nav {
            background-color: #1e3a8a;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav h2 {
            color: white;
            margin: 0;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 18px;
        }

        .hero {
            text-align: center;
            padding-top: 150px;
        }

        h1 {
            color: #1e3a8a;
            font-size: 50px;
        }

        h3 {
            color: #333;
            font-size: 30px;
        }

        p {
            color: #555;
            font-size: 22px;
        }

        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1d4ed8;
        }
        .navbar{
    background:#1e3a8a;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.nav-links{
    display:flex;
    gap:20px;
    align-items:center;
}

.nav-links a{
    color:white;
    text-decoration:none;
    font-size:18px;
}

.nav-links a:hover{
    text-decoration:underline;
}
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="logo">
            CareerConnect
        </div>
    
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/jobs/">Jobs</a>
            <a href="/my-applications/">My Applications</a>
    
            {% if user.is_authenticated %}
                <span>Welcome, {{ user.username }}</span>
                <a href="/logout/">Logout</a>
            {% else %}
                <a href="/login/">Login</a>
                <a href="/register/">Register</a>
            {% endif %}
        </div>
    </nav>

    <div class="hero">

        <h1>CareerConnect Job Portal</h1>

        <h3>Find Your Dream Job</h3>

        <p>Search jobs, apply easily, and grow your career.</p>

        <a href="/jobs/">
            <button>Browse Jobs</button>
        </a>
    </div>

</body>
</html>
